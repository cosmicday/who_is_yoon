<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO IS YOON?</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            min-height: 100vh;
        }

        .main-container {
            text-align: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            margin-top: 60px;
        }

        .main-image {
            max-width: 600px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-row {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 336px;
        }

        .btn {
            width: 100%;
            max-width: 336px;
            box-sizing: border-box;
            padding: 18px 20px;
            font-size: 18px;
            font-family: inherit;
            font-weight: 800;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-decoration: none;
            display: block;
        }

        .btn-row .btn {
            flex: 1;
            padding: 18px 10px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .btn-primary { background-color: #113468; }
        .btn-primary:hover { background-color: #0b2246; }

        .btn-secondary { background-color: #8c96a0; }
        .btn-secondary:hover { background-color: #717a82; }

        @media (max-width: 768px) {
            .main-container { margin-top: 100px; padding: 10px 16px; }
            .btn { font-size: 16px; padding: 15px 16px; }
        }
    </style>
</head>
<body>
    <div class="top-right-buttons">
        <button class="btn-email" onclick="copyEmail()">✉️ 문의하기</button>
        <a href="yoon.html" class="btn-yoon"><img src="favicon.png" alt="">YOON</a>
    </div>

    <div class="main-container">
        <a href="index.html"><img src="main.jpg" alt="WHO IS YOON?" class="main-image"></a>

        <div class="btn-group">
            <a href="metro.html" class="btn btn-primary">광역자치단체장 선거</a>
            <a href="local.html" class="btn btn-primary">기초자치단체장 선거</a>
            <a href="edu.html" class="btn btn-primary">교육감 선거</a>
            <a href="re.html" class="btn btn-primary">재보궐 선거</a>
            <div class="btn-row" style="display:none;">
                <button onclick="alert('준비중입니다')" class="btn btn-secondary">광역의회의원 선거</button>
                <button onclick="alert('준비중입니다')" class="btn btn-secondary">기초의회의원 선거</button>
            </div>
        </div>
    </div>

    <p class="disclaimer">본 사이트는 공직선거 후보자의 공적 발언 및 행동에 관한 공개된 정보를 바탕으로 제작되었으며, 특정 후보를 비방하거나 명예를 훼손할 목적이 없습니다.</p>

    <script src="common.js"></script>
</body>
</html>
