<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>WHO IS YOON? - 교육감 선거</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data/edu.js"></script>
    <script src="common.js"></script>
    <script src="mapPage.js"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>

<div class="top-right-buttons">
    <button class="btn-email" onclick="copyEmail()">✉️ 문의하기</button>
    <a href="yoon.html" class="btn-yoon"><img src="favicon.png" alt="">YOON</a>
</div>

<div class="header">
    <a href="index.html"><img src="main.jpg" alt="Header Logo" class="header-image"></a>
</div>

<div class="main-content">

    <div id="map-wrapper">
        <div class="syringe-container"><div class="syringe-track"></div></div>
        <div id="map-container"></div>
    </div>

    <div id="info-wrapper">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="후보 검색" oninput="executeSearch()">
            <button class="search-btn" onclick="executeSearch()">검색</button>
        </div>
        <h2 id="info-title" class="info-title" style="display:none"></h2>
        <p id="info-desc" class="info-desc">YOON을 찾아봅시다!</p>
        <hr class="info-divider">
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const IMG_DIR = 'images/edu/';

createMapPage({
    election: '교육감',
    geoFile:  'geo/metro.json',

    listRegions:   () => Object.keys(eduData),
    getCandidates: name => eduData[name] || [],
    geoKey:        d => d.properties.CTP_KOR_NM,

    // 교육감은 무당적 — 테두리 단색, 기호·정당 없음
    cardOpts: (c, name) => ({
        borderColor: "#888",
        imgSrc:      c.사진 || `${IMG_DIR}${name}.jpg`,
    }),

    // 경상북도 선택 시 독도 마커도 함께 색상 변경
    setFill: (g, name, color) => {
        d3.select(`path[data-name='${name}']`).style("fill", color);
        if (name === "경상북도") d3.select("#dokdo-marker").style("fill", color);
    },

    onGeoLoaded: ({ g, regions, width, tooltip, setRegionColor, initialFill, getPersisted, deactivateRegion }) => {
        // 독도 마커 (경상북도 bbox 기준)
        let gyeongbukNode = null;
        regions.each(function(d) { if (d.properties.CTP_KOR_NM === "경상북도") gyeongbukNode = this; });

        if (gyeongbukNode) {
            const bbox = gyeongbukNode.getBBox();
            g.append("circle")
                .attr("id", "dokdo-marker").attr("class", "island-marker")
                .attr("cx", bbox.x + 345 * (width / 640)).attr("cy", bbox.y + 45 * (width / 640)).attr("r", 3)
                .style("fill", initialFill("경상북도"))
                .on("mouseover", function() {
                    tooltip.style("display", "block").html("경상북도");
                    if (getPersisted() !== "경상북도") setRegionColor("경상북도", getRegionColor("경상북도"));
                })
                .on("mousemove", e => tooltip.style("top", `${e.pageY - 10}px`).style("left", `${e.pageX + 10}px`))
                .on("mouseout", function() {
                    tooltip.style("display", "none");
                    if (getPersisted() !== "경상북도") setRegionColor("경상북도", initialFill("경상북도"));
                })
                .on("click", () => {
                    const name = "경상북도";
                    getPersisted() === name ? deactivateRegion(name) : window.activateRegion(name);
                });
        }
        // edu: YOON 오버레이 없음
    },
});
</script>
<p class="disclaimer">본 사이트는 공직선거 후보자의 공적 발언 및 행동에 관한 공개된 정보를 바탕으로 제작되었으며, 특정 후보를 비방하거나 명예를 훼손할 목적이 없습니다.</p>
</body>
</html>
