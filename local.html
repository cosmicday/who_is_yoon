<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>WHO IS YOON? - 기초자치단체장 선거</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data/local.js"></script>
    <script src="common.js"></script>
    <script src="mapPage.js"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>

<div class="top-right-buttons">
    <button class="btn-email" onclick="copyEmail()">✉️ 문의하기</button>
    <a href="yoon.html" class="btn-yoon"><img src="favicon.png" alt="">YOON</a>
</div>

<div class="header">
    <a href="index.html"><img src="main.jpg" alt="Header Logo" class="header-image"></a>
</div>

<div class="main-content">

    <div id="map-wrapper">
        <div class="syringe-container"><div class="syringe-track"></div></div>
        <div id="map-container"></div>
    </div>

    <div id="info-wrapper">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="후보 검색" oninput="executeSearch()">
            <button class="search-btn" onclick="executeSearch()">검색</button>
        </div>
        <h2 id="info-title" class="info-title" style="display:none"></h2>
        <p id="info-desc" class="info-desc">YOON을 찾아봅시다!</p>
        <hr class="info-divider">
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
const IMG_DIR = 'images/local/';

const NO_ELECTION_REGIONS = new Set(["세종특별자치시", "제주특별자치도"]);

const ABBR_MAP = {
    "충남": "충청남도", "충북": "충청북도",
    "경남": "경상남도", "경북": "경상북도",
    "전남": "전남광주", "전북": "전북특별자치도",
    "강원": "강원특별자치도",
};

createMapPage({
    election: '기초단체장',
    geoFile:  'geo/local.json',

    listRegions: () => {
        const list = [];
        for (const large in localData)
            for (const small in localData[large])
                list.push(`${large} ${small}`);
        return list;
    },
    getCandidates: name => {
        const idx = name.indexOf(' ');
        if (idx === -1) return [];
        return localData[name.slice(0, idx)]?.[name.slice(idx + 1)] || [];
    },
    geoKey:        d => d.properties.SIG_KOR_NM,
    candidateName: c => (c.이름 || '').replace(/[A-Z]$/, ''),

    isNoElection:  name => NO_ELECTION_REGIONS.has(name.split(' ')[0]),
    noElectionMsg: '해당 지역에서는 기초자치단체장 선거가 치러지지 않습니다!',

    expandTerm: term => {
        let t = term;
        for (const [abbr, full] of Object.entries(ABBR_MAP))
            t = t.replace(new RegExp(abbr, 'g'), full);
        return t;
    },

    cardOpts: (c, _displayName) => ({
        borderColor: partyColors[c.정당] || "#555",
        imgSrc:      c.사진 || `${IMG_DIR}${c.이름}.jpg`,
        number:      c.기호,
        party:       c.정당 || "무소속",
    }),

    setFill: (g, name, color) => {
        g.selectAll("path.land")
            .filter(d => d.properties && d.properties.SIG_KOR_NM === name)
            .style("fill", color);
        if (name === "경상북도 울릉군") d3.select("#dokdo-marker").style("fill", color);
    },

    onGeoLoaded: ({ g, regions, width, tooltip, setRegionColor, initialFill, getPersisted, deactivateRegion }) => {
        let ulleungNode = null;
        regions.each(function(d) { if (d.properties.SIG_KOR_NM?.includes("울릉군")) ulleungNode = this; });

        if (ulleungNode) {
            const bbox = ulleungNode.getBBox();
            g.append("circle")
                .attr("id", "dokdo-marker").attr("class", "island-marker")
                .attr("cx", bbox.x + 670 * (width / 640)).attr("cy", bbox.y + 200 * (width / 640)).attr("r", 3)
                .style("fill", initialFill("경상북도 울릉군"))
                .on("mouseover", function() {
                    tooltip.style("display", "block").html("경상북도 울릉군");
                    if (getPersisted() !== "경상북도 울릉군") setRegionColor("경상북도 울릉군", getRegionColor("경상북도 울릉군"));
                })
                .on("mousemove", e => tooltip.style("top", `${e.pageY - 10}px`).style("left", `${e.pageX + 10}px`))
                .on("mouseout", function() {
                    tooltip.style("display", "none");
                    if (getPersisted() !== "경상북도 울릉군") setRegionColor("경상북도 울릉군", initialFill("경상북도 울릉군"));
                })
                .on("click", function() {
                    const name = "경상북도 울릉군";
                    getPersisted() === name ? deactivateRegion(name) : window.activateRegion(name);
                });
        }

        const yoonRegions = new Set();
        for (const large in localData)
            for (const small in localData[large])
                if ((localData[large][small] || []).some(c => c.yoon))
                    yoonRegions.add(`${large} ${small}`);

        const yoonOverlay = g.append("g").attr("class", "yoon-overlay");
        g.selectAll("path.land")
            .filter(d => d.properties && yoonRegions.has(d.properties.SIG_KOR_NM))
            .each(function() {
                const dAttr = d3.select(this).attr("d");
                if (dAttr) yoonOverlay.append("path")
                    .attr("d", dAttr).attr("fill", "none")
                    .attr("stroke", "#ae1932").attr("stroke-width", "1px")
                    .style("pointer-events", "none");
            });
    },
});
</script>
<p class="disclaimer">본 사이트는 공직선거 후보자의 공적 발언 및 행동에 관한 공개된 정보를 바탕으로 제작되었으며, 특정 후보를 비방하거나 명예를 훼손할 목적이 없습니다.</p>
</body>
</html>
