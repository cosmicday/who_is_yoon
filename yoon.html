<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO IS YOON? - YOON 모아보기</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <script src="data/metro.js"></script>
    <script src="data/local.js"></script>
    <script src="data/edu.js"></script>
    <script src="data/re.js"></script>
    <script src="common.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        .yoon-page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0 10px 0;
        }

        .header-image { width: 350px; height: auto; }

        .yoon-box {
            border: 2px solid #222;
            border-radius: 8px;
            padding: 30px;
            background: #fff;
            min-height: 640px;
        }

        .yoon-box-title {
            font-size: 22px;
            font-weight: 900;
            color: #ae1932;
            margin: 0 0 6px 0;
        }

        .yoon-box-subtitle {
            font-size: 14px;
            color: #888;
            margin: 0 0 20px 0;
        }

        .yoon-divider {
            width: 100%;
            border: 0;
            border-top: 1px solid #222;
            margin: 0;
        }

        /* 테이블 헤더 */
        .yoon-table-header {
            display: grid;
            grid-template-columns: 15fr 15fr 15fr 55fr;
            background: #f8f8f8;
            border-bottom: 2px solid #222;
            padding: 10px 0;
        }

        .yoon-table-header div {
            font-size: 12px;
            font-weight: 800;
            color: #555;
            text-align: center;
            padding: 0 12px;
        }

        .yoon-table-header div:not(:last-child) {
            border-right: 1px solid #ddd;
        }

        /* 행 */
        .yoon-row {
            display: grid;
            grid-template-columns: 15fr 15fr 15fr 55fr;
            border-bottom: 1px solid #eee;
            min-height: 100px;
            align-items: stretch;
        }

        .yoon-row:last-child {
            border-bottom: none;
        }

        .yoon-row:hover {
            background: #fdf5f5;
        }

        /* 각 셀 공통 */
        .yoon-cell {
            padding: 14px 12px;
            display: flex;
            align-items: center;
        }

        .yoon-cell:not(:last-child) {
            border-right: 1px solid #eee;
        }

        /* 셀 1: 선거 + 지역 - 가운데 정렬 */
        .cell-region {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 6px;
        }

        .election-badge {
            font-size: 11px;
            background: #222;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
        }

        .region-text {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            line-height: 1.4;
        }

        /* 셀 2: 사진 - 가운데 정렬 */
        .cell-photo {
            justify-content: center;
            align-items: center;
        }

        .yoon-candidate-img {
            width: 60px;
            height: 78px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
            background: #f5f5f5;
        }

        /* 셀 3: 기호 + 이름 + 정당 + 뱃지 - 가운데 정렬 */
        .cell-info {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 4px;
        }

        .info-number {
            font-size: 12px;
            font-weight: 700;
            color: #113468;
        }

        .info-name {
            font-size: 20px;
            font-weight: 900;
            color: #111;
        }

        .info-party {
            font-size: 13px;
            font-weight: 600;
        }

        .yoon-badge-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #ae1932;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 9px;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 2px;
        }

        .yoon-badge-link:hover {
            background: #8c1426;
        }

        .yoon-badge-link img {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }

        /* 셀 4: 근거 */
        .cell-evidence {
            align-items: flex-start;
        }

        .evidence-text {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }

        .evidence-sources {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .evidence-source-item a {
            font-size: 12px;
            color: #888;
            text-decoration: none;
            border-bottom: 1px dotted #bbb;
        }

        .evidence-source-item a:hover {
            color: #ae1932;
            border-bottom-color: #ae1932;
        }

        .evidence-empty {
            font-size: 13px;
            color: #ccc;
            font-style: italic;
            margin: 0;
        }

        .yoon-empty {
            text-align: center;
            color: #aaa;
            font-size: 16px;
            padding: 60px 0;
        }

        .evidence-sup {
            font-size: 10px;
            vertical-align: super;
            color: #ae1932;
            font-weight: 700;
            line-height: 0;
        }

        /* ── 모바일: 4칸 → 2칸 ── */
        @media (max-width: 768px) {
            .yoon-table-header {
                grid-template-columns: 1fr 1fr;
            }
            /* 사진·후보자 헤더 숨김 (왼칸에 합침) */
            .yoon-table-header div:nth-child(2),
            .yoon-table-header div:nth-child(3) {
                display: none;
            }
            .yoon-table-header div:first-child {
                border-right: 1px solid #ddd;
            }

            .yoon-row {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto;
            }

            /* 왼칸: 선거/지역 + 사진 + 후보자 정보를 세로로 쌓음 */
            .yoon-cell.cell-region {
                grid-column: 1;
                grid-row: 1;
                flex-direction: column;
                align-items: center;
                border-right: 1px solid #eee;
                border-bottom: none;
            }
            .yoon-cell.cell-photo {
                grid-column: 1;
                grid-row: 2;
                border-right: 1px solid #eee;
                border-bottom: none;
                justify-content: center;
            }
            .yoon-cell.cell-info {
                grid-column: 1;
                grid-row: 3;
                border-right: 1px solid #eee;
                border-bottom: none;
            }

            /* 오른칸: 근거가 3행 전체를 차지 */
            .yoon-cell.cell-evidence {
                grid-column: 2;
                grid-row: 1 / 4;
                align-items: flex-start;
            }

            /* 구분선 제거 */
            .yoon-cell:not(:last-child) {
                border-right: none;
            }

            .evidence-text {
                font-size: 13px;
            }

            .yoon-box {
                padding: 15px;
            }

            /* 4번: 선거/지역+사진+후보자 칸 세로 공간 60% 축소 */
            .yoon-cell {
                padding: 3px 12px;
            }
            .yoon-row {
                min-height: 40px;
            }
            .yoon-cell.cell-region {
                gap: 2px;
            }
            .yoon-cell.cell-info {
                gap: 2px;
            }

            /* 5번: 헤더 텍스트 변경 + grid 비율 조정 (선거/지역 40% 축소) */
            .yoon-table-header {
                grid-template-columns: 0.42fr 1fr;
            }
            .yoon-table-header div:first-child::before {
                content: 'YOON';
            }
            .yoon-table-header div:first-child {
                font-size: 0;
            }
            .yoon-table-header div:last-child::before {
                content: 'WHY';
            }
            .yoon-table-header div:last-child {
                font-size: 0;
            }
            .yoon-table-header div:first-child::before,
            .yoon-table-header div:last-child::before {
                font-size: 12px;
            }
            .yoon-row {
                grid-template-columns: 0.42fr 1fr;
            }
        }
    </style>
</head>

<body>

<div class="top-right-buttons">
    <button class="btn-email" onclick="copyEmail()">✉️ 문의하기</button>
    <a href="yoon.html" class="btn-yoon"><img src="favicon.png" alt="">YOON</a>
</div>
    <div class="yoon-page-container">
        <div class="header">
            <a href="index.html"><img src="main.jpg" alt="Header Logo" class="header-image"></a>
        </div>

        <div class="yoon-box">
            <h2 class="yoon-box-title">YOON 모아보기</h2>
            <p class="yoon-box-subtitle" id="subtitle">발견된 YOON을 불러오는 중...</p>
            <hr class="yoon-divider">

            <div class="yoon-table-header">
                <div>선거 / 지역</div>
                <div>사진</div>
                <div>후보자</div>
                <div>WHY YOON?</div>
            </div>

            <div id="yoon-list"></div>
        </div>
    </div>

    <script>

        // 선거 페이지 URL 매핑
        const electionPages = {
            '광역단체장': 'metro.html',
            '기초단체장': 'local.html',
            '교육감': 'edu.html',
            '재보궐': 're.html'
        };

        // 일관된 앵커 ID 생성
        function makeYoonAnchorId(election, name) {
            return 'yoon-' + election + '-' + name.trim();
        }

        function collectYoonCandidates() {
            const results = [];

            if (typeof metroData !== 'undefined') {
                for (const region in metroData) {
                    (metroData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '광역단체장', region, number: c.기호 || '-', name: pureName, party: c.정당 || '무소속', img: c.사진 || `images/metro/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            if (typeof localData !== 'undefined') {
                for (const large in localData) {
                    for (const small in localData[large]) {
                        (localData[large][small] || []).forEach(c => {
                            if (c.yoon) {
                                const rawName = c.이름 || '';
                                const displayName = rawName.replace(/[A-Z]$/, '');
                                results.push({ election: '기초단체장', region: `${large} ${small}`, number: c.기호 || '-', name: displayName, party: c.정당 || '무소속', img: c.사진 || `images/local/${rawName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                            }
                        });
                    }
                }
            }

            if (typeof eduData !== 'undefined') {
                for (const region in eduData) {
                    (eduData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '교육감', region, number: c.기호 || '-', name: pureName, party: '', img: c.사진 || `images/edu/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            if (typeof reData !== 'undefined') {
                for (const region in reData) {
                    (reData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '재보궐', region, number: c.기호 || '-', name: pureName, party: c.정당 || '무소속', img: c.사진 || `images/re/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            return results;
        }

        function renderRows() {
            const list = document.getElementById('yoon-list');
            const candidates = collectYoonCandidates();

            if (candidates.length === 0) {
                list.innerHTML = '<p class="yoon-empty">아직 등록된 YOON 후보자가 없습니다.</p>';
                document.getElementById('subtitle').textContent = '아직 등록된 YOON 후보자가 없습니다.';
                return;
            }

            document.getElementById('subtitle').textContent = `발견된 YOON은 총 ${candidates.length}명입니다.`;

            candidates.forEach(c => {
                const pColor = partyColors[c.party] || '#555555';
                const anchorId = makeYoonAnchorId(c.election, c.name);
                const page = electionPages[c.election] || 'index.html';
                const regionParam = encodeURIComponent(c.region);
                const electionPageUrl = `${page}?region=${regionParam}`;

                const row = document.createElement('div');
                row.className = 'yoon-row';
                row.id = anchorId;

                // 셀 1: 선거 + 지역
                const cell1 = document.createElement('div');
                cell1.className = 'yoon-cell cell-region';
                cell1.innerHTML = `
                    <span class="election-badge">${c.election}</span>
                    <span class="region-text">${c.region}</span>
                `;

                // 셀 2: 사진
                const cell2 = document.createElement('div');
                cell2.className = 'yoon-cell cell-photo';
                const img = document.createElement('img');
                img.className = 'yoon-candidate-img';
                img.src = c.img;
                img.onerror = function () { this.src = 'images/default.jpg'; };
                cell2.appendChild(img);

                // 셀 3: 기호 + 이름 + 정당 + 뱃지
                const cell3 = document.createElement('div');
                cell3.className = 'yoon-cell cell-info';
                if (c.number && c.number !== '-') {
                    const num = document.createElement('div');
                    num.className = 'info-number';
                    num.textContent = `기호 ${c.number}번`;
                    cell3.appendChild(num);
                }
                const name = document.createElement('div');
                name.className = 'info-name';
                name.textContent = c.name;
                cell3.appendChild(name);
                if (c.party) {
                    const party = document.createElement('div');
                    party.className = 'info-party';
                    party.style.color = pColor;
                    party.textContent = c.party;
                    cell3.appendChild(party);
                }
                // 뱃지 → 선거 페이지로 이동
                const badge = document.createElement('a');
                badge.className = 'yoon-badge-link';
                badge.href = electionPageUrl;
                badge.innerHTML = `<img src="favicon.png" alt=""> YOON`;
                cell3.appendChild(badge);

                // 셀 4: 근거
                const cell4 = document.createElement('div');
                cell4.className = 'yoon-cell cell-evidence';
                if (c.evidence) {
                    const ev = document.createElement('p');
                    ev.className = 'evidence-text';
                    const sourceMap = {};
                    (c.sources || []).forEach(s => { sourceMap[s.n] = s.url; });
                    const html = c.evidence
                        .replace(/\n/g, '<br>')
                        .replace(/\[(\d+)\]/g, (match, n) => {
                            const url = sourceMap[parseInt(n)];
                            if (url) return `<sup class="evidence-sup"><a href="${url}" target="_blank" title="${url}" style="color:inherit;text-decoration:none;">[${n}]</a></sup>`;
                            return `<sup class="evidence-sup">[${n}]</sup>`;
                        });
                    ev.innerHTML = html;
                    cell4.appendChild(ev);
                } else {
                    const ev = document.createElement('p');
                    ev.className = 'evidence-empty';
                    ev.textContent = '근거 준비중';
                    cell4.appendChild(ev);
                }

                row.appendChild(cell1);
                row.appendChild(cell2);
                row.appendChild(cell3);
                row.appendChild(cell4);
                list.appendChild(row);
            });

            // URL에 앵커가 있으면 해당 위치로 스크롤
            if (window.location.hash) {
                const hashId = decodeURIComponent(window.location.hash.slice(1));
                const target = document.getElementById(hashId);
                if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
            }
        }

        renderRows();
    </script>
    <p class="disclaimer">본 사이트는 공직선거 후보자의 공적 발언 및 행동에 관한 공개된 정보를 바탕으로 제작되었으며, 특정 후보를 비방하거나 명예를 훼손할 목적이 없습니다.</p>
</body>
</html>
