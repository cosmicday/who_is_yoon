<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO IS YOON? - YOON 모아보기</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <script src="data/metro.js"></script>
    <script src="data/local.js"></script>
    <script src="data/edu.js"></script>
    <script src="data/re.js"></script>
    <script src="common.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        .yoon-page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0 10px 0;
        }

        .header-image { width: 350px; height: auto; }

        .yoon-box {
            border: 2px solid #222;
            border-radius: 8px;
            padding: 30px;
            background: #fff;
            min-height: 640px;
        }

        .yoon-box-title {
            font-size: 22px;
            font-weight: 900;
            color: #ae1932;
            margin: 0 0 6px 0;
        }

        .yoon-box-subtitle {
            font-size: 14px;
            color: #888;
            margin: 0 0 20px 0;
        }

        .yoon-divider {
            width: 100%;
            border: 0;
            border-top: 1px solid #222;
            margin: 0;
        }

        .yoon-table-header {
            display: grid;
            grid-template-columns: 15fr 15fr 15fr 55fr;
            background: #f8f8f8;
            border-bottom: 2px solid #222;
            padding: 10px 0;
        }

        .yoon-table-header div {
            font-size: 12px;
            font-weight: 800;
            color: #555;
            text-align: center;
            padding: 0 12px;
        }

        .yoon-table-header div:not(:last-child) {
            border-right: 1px solid #ddd;
        }

        .yoon-row {
            display: grid;
            grid-template-columns: 15fr 15fr 15fr 55fr;
            border-bottom: 1px solid #eee;
            min-height: 100px;
            align-items: stretch;
        }

        .yoon-row:last-child {
            border-bottom: none;
        }

        .yoon-row:hover {
            background: #fdf5f5;
        }

        .yoon-cell {
            padding: 14px 12px;
            display: flex;
            align-items: center;
        }

        .yoon-cell:not(:last-child) {
            border-right: 1px solid #eee;
        }

        .cell-region {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 6px;
        }

        .election-badge {
            font-size: 11px;
            background: #222;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
        }

        .region-text {
            font-size: 13px;
            font-weight: 700;
            color: #333;
            line-height: 1.4;
        }

        .cell-photo {
            justify-content: center;
            align-items: center;
        }

        .yoon-candidate-img {
            width: 60px;
            height: 78px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
            background: #f5f5f5;
        }

        .cell-info {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 4px;
        }

        .info-number {
            font-size: 12px;
            font-weight: 700;
            color: #113468;
        }

        .info-name {
            font-size: 20px;
            font-weight: 900;
            color: #111;
        }

        .info-party {
            font-size: 13px;
            font-weight: 600;
        }

        .yoon-badge-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #ae1932;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 9px;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 2px;
        }

        .yoon-badge-link:hover {
            background: #8c1426;
        }

        .yoon-badge-link img {
            width: 12px;
            height: 12px;
            object-fit: contain;
        }

        .cell-evidence {
            align-items: center;
        }

        .evidence-text {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }

        .evidence-sources {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .evidence-source-item a {
            font-size: 12px;
            color: #888;
            text-decoration: none;
            border-bottom: 1px dotted #bbb;
        }

        .evidence-source-item a:hover {
            color: #ae1932;
            border-bottom-color: #ae1932;
        }

        .evidence-empty {
            font-size: 13px;
            color: #ccc;
            font-style: italic;
            margin: 0;
        }

        .yoon-empty {
            text-align: center;
            color: #aaa;
            font-size: 16px;
            padding: 60px 0;
        }

        .evidence-sup {
            font-size: 10px;
            vertical-align: super;
            color: #ae1932;
            font-weight: 700;
            line-height: 0;
        }

        .th-mobile  { display: none; }
        .th-desktop { display: inline; }
        .th-pc-only { display: table-cell; }

        @media (max-width: 768px) {
            .header-image { width: 220px; }

            .yoon-table-header {
                grid-template-columns: auto 1fr;
            }
            .yoon-table-header div:nth-child(2),
            .yoon-table-header div:nth-child(3) { display: none; }
            .yoon-table-header div:first-child { border-right: 1px solid #ddd; }

            .yoon-row {
                display: flex;
                flex-direction: row;
                align-items: stretch;
            }

            .yoon-left-col {
                flex: 0 0 auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border-right: 1px solid #eee;
                box-sizing: border-box;
            }

            .yoon-left-col .yoon-cell {
                padding: 12px 5px;
                border-right: none;
            }

            .yoon-left-col .yoon-cell.cell-region {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 3px;
                padding-bottom: 5px;
            }

            .region-text {
                white-space: nowrap;
            }

            .yoon-left-col .yoon-cell.cell-photo {
                justify-content: center;
                align-items: center;
                padding-top: 5px;
                padding-bottom: 3px;
            }

            .yoon-left-col .yoon-cell.cell-info {
                justify-content: flex-start;
                align-items: center;
                gap: 1px;
                padding-top: 3px;
            }

            .yoon-cell.cell-evidence {
                flex: 1;
                border-left: none;
                align-items: center;
                padding: 10px;
            }

            .evidence-text { font-size: 13px; }
            .yoon-box { padding: 15px; }
            .info-number { color: #222; }

            .th-desktop { display: none; }
            .th-mobile  { display: inline; }
            .th-pc-only { display: none; }
        }
    </style>
</head>

<body>

<div class="top-right-buttons">
    <button class="btn-email" onclick="copyEmail()">✉️ 문의하기</button>
    <a href="yoon.html" class="btn-yoon"><img src="favicon.png" alt="">YOON</a>
</div>
    <div class="yoon-page-container">
        <div class="header">
            <a href="index.html"><img src="main.jpg" alt="Header Logo" class="header-image"></a>
        </div>

        <div class="yoon-box">
            <h2 class="yoon-box-title">YOON 모아보기</h2>
            <p class="yoon-box-subtitle" id="subtitle">발견된 YOON을 불러오는 중...</p>
            <hr class="yoon-divider">

            <div class="yoon-table-header">
                <div>
                    <span class="th-desktop">선거 / 지역</span>
                    <span class="th-mobile">YOON</span>
                </div>
                <div class="th-pc-only">사진</div>
                <div class="th-pc-only">후보자</div>
                <div>WHY</div>
            </div>

            <div id="yoon-list"></div>
        </div>
    </div>

    <script>
        const electionPages = {
            '광역단체장': 'metro.html',
            '기초단체장': 'local.html',
            '교육감': 'edu.html',
            '재보궐': 're.html'
        };

        function makeYoonAnchorId(election, name) {
            return 'yoon-' + election + '-' + name.trim();
        }

        function collectYoonCandidates() {
            const results = [];

            if (typeof metroData !== 'undefined') {
                for (const region in metroData) {
                    (metroData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '광역단체장', region, number: c.기호 || '-', name: pureName, party: c.정당 || '무소속', img: c.사진 || `images/metro/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            if (typeof localData !== 'undefined') {
                for (const large in localData) {
                    for (const small in localData[large]) {
                        (localData[large][small] || []).forEach(c => {
                            if (c.yoon) {
                                const rawName = c.이름 || '';
                                const displayName = rawName.replace(/[A-Z]$/, '');
                                results.push({ election: '기초단체장', region: `${large} ${small}`, number: c.기호 || '-', name: displayName, party: c.정당 || '무소속', img: c.사진 || `images/local/${rawName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                            }
                        });
                    }
                }
            }

            if (typeof eduData !== 'undefined') {
                for (const region in eduData) {
                    (eduData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '교육감', region, number: c.기호 || '-', name: pureName, party: '', img: c.사진 || `images/edu/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            if (typeof reData !== 'undefined') {
                for (const region in reData) {
                    (reData[region] || []).forEach(c => {
                        if (c.yoon) {
                            const pureName = (c.이름 || '').split('(')[0].trim();
                            results.push({ election: '재보궐', region, number: c.기호 || '-', name: pureName, party: c.정당 || '무소속', img: c.사진 || `images/re/${pureName}.jpg`, evidence: c.근거 || '', sources: c.출처 || [] });
                        }
                    });
                }
            }

            return results;
        }

        function renderRows() {
            const list = document.getElementById('yoon-list');
            const candidates = collectYoonCandidates();

            if (candidates.length === 0) {
                list.innerHTML = '<p class="yoon-empty">아직 등록된 YOON 후보자가 없습니다.</p>';
                document.getElementById('subtitle').textContent = '아직 등록된 YOON 후보자가 없습니다.';
                return;
            }

            document.getElementById('subtitle').textContent = `발견된 YOON은 총 ${candidates.length}명입니다.`;

            candidates.forEach(c => {
                const pColor = partyColors[c.party] || '#555555';
                const anchorId = makeYoonAnchorId(c.election, c.name);
                const page = electionPages[c.election] || 'index.html';
                const regionParam = encodeURIComponent(c.region);
                const electionPageUrl = `${page}?region=${regionParam}`;

                const row = document.createElement('div');
                row.className = 'yoon-row';
                row.id = anchorId;

                const cell1 = document.createElement('div');
                cell1.className = 'yoon-cell cell-region';
                cell1.innerHTML = `
                    <span class="election-badge">${c.election}</span>
                    <span class="region-text" style="white-space:nowrap">${c.region}</span>
                `;

                const cell2 = document.createElement('div');
                cell2.className = 'yoon-cell cell-photo';
                const img = document.createElement('img');
                img.className = 'yoon-candidate-img';
                img.src = c.img;
                img.onerror = function () { this.src = 'images/default.jpg'; };
                cell2.appendChild(img);

                const cell3 = document.createElement('div');
                cell3.className = 'yoon-cell cell-info';
                if (c.number && c.number !== '-') {
                    const num = document.createElement('div');
                    num.className = 'info-number';
                    num.textContent = `기호 ${c.number}번`;
                    cell3.appendChild(num);
                }
                const name = document.createElement('div');
                name.className = 'info-name';
                name.textContent = c.name;
                cell3.appendChild(name);
                if (c.party) {
                    const party = document.createElement('div');
                    party.className = 'info-party';
                    party.style.color = pColor;
                    party.textContent = c.party;
                    cell3.appendChild(party);
                }
                const badge = document.createElement('a');
                badge.className = 'yoon-badge-link';
                badge.href = electionPageUrl;
                badge.innerHTML = `<img src="favicon.png" alt="" width="12" height="12"> YOON`;
                cell3.appendChild(badge);

                const cell4 = document.createElement('div');
                cell4.className = 'yoon-cell cell-evidence';
                if (c.evidence) {
                    const ev = document.createElement('p');
                    ev.className = 'evidence-text';
                    const sourceMap = {};
                    (c.sources || []).forEach(s => { sourceMap[s.n] = s.url; });
                    const html = c.evidence
                        .replace(/\n/g, '<br>')
                        .replace(/\[(\d+)\]/g, (match, n) => {
                            const url = sourceMap[parseInt(n)];
                            if (url) return `<sup class="evidence-sup"><a href="${url}" target="_blank" title="${url}" style="color:inherit;text-decoration:none;">[${n}]</a></sup>`;
                            return `<sup class="evidence-sup">[${n}]</sup>`;
                        });
                    ev.innerHTML = html;
                    cell4.appendChild(ev);
                } else {
                    const ev = document.createElement('p');
                    ev.className = 'evidence-empty';
                    ev.textContent = '근거 준비중';
                    cell4.appendChild(ev);
                }

                if (window.innerWidth <= 768) {
                    const leftCol = document.createElement('div');
                    leftCol.className = 'yoon-left-col';
                    leftCol.appendChild(cell1);
                    leftCol.appendChild(cell2);
                    leftCol.appendChild(cell3);
                    row.appendChild(leftCol);
                } else {
                    row.appendChild(cell1);
                    row.appendChild(cell2);
                    row.appendChild(cell3);
                }
                row.appendChild(cell4);
                list.appendChild(row);
            });

            if (window.location.hash) {
                const hashId = decodeURIComponent(window.location.hash.slice(1));
                const target = document.getElementById(hashId);
                if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
            }

            if (window.innerWidth <= 768) {
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    const leftCols = Array.from(document.querySelectorAll('#yoon-list .yoon-left-col'));
                    if (!leftCols.length) return;
                    const maxW = Math.ceil(Math.max(...leftCols.map(el => el.getBoundingClientRect().width)));
                    leftCols.forEach(el => { el.style.flex = `0 0 ${maxW}px`; });
                    const header = document.querySelector('.yoon-table-header');
                    if (header) header.style.gridTemplateColumns = `${maxW}px 1fr`;
                }));
            }
        }

        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(renderRows);
        } else {
            renderRows();
        }
    </script>
    <p class="disclaimer">본 사이트는 공직선거 후보자의 공적 발언 및 행동에 관한 공개된 정보를 바탕으로 제작되었으며, 특정 후보를 비방하거나 명예를 훼손할 목적이 없습니다.</p>
</body>
</html>
